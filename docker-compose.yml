version: '3.8'

services:
  scanner:
    build: .
    container_name: stocks-scanner
    ports:
      - "8030:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/api_keys.json:/app/config/api_keys.json:ro
    environment:
      - TZ=America/New_York
    restart: unless-stopped
